<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Contact</h1>

    <section class="contact">

        <p class="intro-contact">
            Une question, une demande ou envie d’échanger ?  
            Tu peux me contacter via ce formulaire :
        </p>

        <form action="mailto:chloe.faillie@gmail.com" method="POST" enctype="text/plain" class="contact-form">

            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="Nom" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="Email" required>

            <label for="message">Message :</label>
            <textarea id="message" name="Message" rows="6" required></textarea>

            <button type="submit" class="btn-contact">Envoyer</button>
        </form>

        <div class="retour">
            <a href="index.html" class="btn-retour">Retour au portfolio</a>
        </div>

    </section>

</body>

</html>
